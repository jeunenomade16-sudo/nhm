<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 120 120">
  <!-- Warm oak base -->
  <rect width="120" height="120" fill="#d9b282" />
  <linearGradient id="oak-grad" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#e3bf96" />
    <stop offset="100%" stop-color="#c89d6c" />
  </linearGradient>
  <rect width="120" height="120" fill="url(#oak-grad)" opacity="0.7" />
  <!-- Organic wood rings and grain curves -->
  <g stroke="#aa7e50" stroke-width="1.5" fill="none" opacity="0.65">
    <path d="M-10,20 C30,15 80,35 130,20" />
    <path d="M-10,45 C40,40 70,60 130,50" stroke-width="1" />
    <path d="M-10,70 C30,65 90,85 130,75" stroke-width="2" />
    <path d="M-10,95 C40,90 70,110 130,100" stroke-width="1.2" />
    <!-- Fine grain lines -->
    <path d="M-10,5 Q50,20 130,5" stroke-dasharray="8 4" stroke-width="0.75" />
    <path d="M-10,80 Q60,95 130,80" stroke-dasharray="12 6" stroke-width="0.75" />
  </g>
  <g stroke="#ffffff" stroke-width="0.8" fill="none" opacity="0.2">
    <path d="M-10,32 C30,27 80,47 130,32" />
    <path d="M-10,82 C30,77 90,97 130,87" />
  </g>
</svg>
