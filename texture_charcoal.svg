<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 120 120">
  <!-- Dark charcoal wood base -->
  <rect width="120" height="120" fill="#18181a" />
  <linearGradient id="charcoal-grad" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#141416" />
    <stop offset="50%" stop-color="#222226" />
    <stop offset="100%" stop-color="#141416" />
  </linearGradient>
  <rect width="120" height="120" fill="url(#charcoal-grad)" opacity="0.8" />
  <!-- Wavy vertical wood grain paths -->
  <g stroke="#0e0e0f" stroke-width="1.5" fill="none" opacity="0.8">
    <path d="M10,0 C12,30 8,60 11,120" />
    <path d="M30,0 C28,40 32,80 29,120" stroke-width="1" />
    <path d="M50,0 C55,30 45,90 52,120" stroke-width="2" />
    <path d="M70,0 C68,45 73,75 70,120" stroke-width="1.2" />
    <path d="M90,0 C92,30 88,80 91,120" stroke-width="1.8" />
    <path d="M110,0 C108,40 112,70 109,120" stroke-width="1" />
  </g>
  <!-- Soft vertical lines for wood texture -->
  <g stroke="#2c2c32" stroke-width="0.5" fill="none" opacity="0.3">
    <path d="M20,0 L20,120" />
    <path d="M40,0 L40,120" />
    <path d="M60,0 L60,120" />
    <path d="M80,0 L80,120" />
    <path d="M100,0 L100,120" />
  </g>
</svg>
