<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 120 120">
  <radialGradient id="metal-grad" cx="50%" cy="40%" r="60%">
    <stop offset="0%" stop-color="#2c2c32" />
    <stop offset="70%" stop-color="#141416" />
    <stop offset="100%" stop-color="#0b0b0c" />
  </radialGradient>
  <rect width="120" height="120" fill="url(#metal-grad)" />
  <!-- Fine diagonal lines to simulate a micro-brushed matte finish -->
  <g stroke="#ffffff" stroke-width="0.5" fill="none" opacity="0.05">
    <line x1="-20" y1="0" x2="120" y2="140" stroke-dasharray="1 3" />
    <line x1="0" y1="-20" x2="140" y2="120" stroke-dasharray="1 3" />
    <line x1="-40" y1="20" x2="100" y2="160" stroke-dasharray="1 3" />
  </g>
</svg>
